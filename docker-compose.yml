version: '3.8'

services:
  app:
    build: 
      context: .
      target: production
    ports:
      - "5000:5000"  # Backend port
      - "5173:5173"  # Frontend port
    environment:
      - NODE_ENV=production
      - VITE_API_BASE_URL=http://localhost:5000/api
      - REALM_DISABLE_ANALYTICS=1
      - REALM_SKIP_BSON_VALIDATION=1
      - PYTHON=/usr/bin/python3
      - NODE_GYP_FORCE_PYTHON=/usr/bin/python3
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev
    restart: unless-stopped
