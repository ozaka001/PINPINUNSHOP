version: '3.8'

services:
  app:
    build: 
      context: .
      target: production
    ports:
      - "5000:5000"  # Backend port
      - "5173:5173"  # Frontend port
    environment:
      - NODE_ENV=production
      - VITE_API_BASE_URL=http://localhost:5000/api
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev
    restart: unless-stopped
